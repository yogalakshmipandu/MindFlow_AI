<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }
        h1 { margin-bottom: 15px; color: #4ecdc4; }
        #gameContainer {
            background: #16213e;
            padding: 25px;
            border-radius: 15px;
            border: 3px solid #4ecdc4;
        }
        #sudokuGrid {
            display: grid;
            grid-template-columns: repeat(9, 45px);
            gap: 0;
            border: 3px solid #4ecdc4;
        }
        .cell {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: #0f0f23;
            border: 1px solid #2a2a4a;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
        }
        .cell:hover { background: #1a1a3e; }
        .cell.selected { background: #2a4a6a; }
        .cell.fixed { color: #4ecdc4; cursor: default; }
        .cell.error { background: #4a2020; color: #ff6b6b; }
        .cell:nth-child(3n) { border-right: 2px solid #4ecdc4; }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #4ecdc4;
        }
        #numpad {
            display: grid;
            grid-template-columns: repeat(9, 45px);
            gap: 5px;
            margin-top: 20px;
        }
        .num-btn {
            width: 45px;
            height: 45px;
            font-size: 20px;
            font-weight: bold;
            background: #4ecdc4;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .num-btn:hover { background: #45b7aa; transform: scale(1.1); }
        .num-btn:active { transform: scale(0.95); }
        #buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }
        button.game-btn {
            background: #4ecdc4;
            color: #1a1a2e;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button.game-btn:hover { background: #45b7aa; }
        #backBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4ecdc4;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #message {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #2ecc71;
            min-height: 25px;
        }
        #instructions {
            margin-top: 10px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <button id="backBtn" onclick="window.parent.closeGamePanel()">← Back to Focus</button>
    <h1>🎯 Sudoku</h1>
    <div id="gameContainer">
        <div id="sudokuGrid"></div>
        <div id="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
        </div>
        <div id="buttons">
            <button class="game-btn" onclick="checkSolution()">Check</button>
            <button class="game-btn" onclick="newGame()">New Puzzle</button>
            <button class="game-btn" onclick="clearCell()">Clear</button>
        </div>
        <div id="message"></div>
    </div>
    <div id="instructions">Click a cell, then click a number or press 1-9 on keyboard</div>

    <script>
        let puzzle = [];
        let solution = [];
        let userGrid = [];
        let selectedCell = null;
        
        function isValid(board, row, col, num) {
            // Check row
            for (let c = 0; c < 9; c++) {
                if (board[row][c] === num) return false;
            }
            // Check column
            for (let r = 0; r < 9; r++) {
                if (board[r][col] === num) return false;
            }
            // Check 3x3 box
            const boxRow = Math.floor(row / 3) * 3;
            const boxCol = Math.floor(col / 3) * 3;
            for (let r = boxRow; r < boxRow + 3; r++) {
                for (let c = boxCol; c < boxCol + 3; c++) {
                    if (board[r][c] === num) return false;
                }
            }
            return true;
        }
        
        function solve(board) {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0) {
                        const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                        for (let num of nums) {
                            if (isValid(board, r, c, num)) {
                                board[r][c] = num;
                                if (solve(board)) return true;
                                board[r][c] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }
        
        function generatePuzzle() {
            // Generate solved board
            solution = Array(9).fill().map(() => Array(9).fill(0));
            
            // Fill diagonal 3x3 boxes
            for (let i = 0; i < 9; i += 3) {
                const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                let k = 0;
                for (let r = i; r < i + 3; r++) {
                    for (let c = i; c < i + 3; c++) {
                        solution[r][c] = nums[k++];
                    }
                }
            }
            
            solve(solution);
            
            // Create puzzle by removing cells
            puzzle = solution.map(row => [...row]);
            userGrid = Array(9).fill().map(() => Array(9).fill(0));
            
            let cellsToRemove = 40;
            const positions = [];
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    positions.push([r, c]);
                }
            }
            positions.sort(() => Math.random() - 0.5);
            
            for (let i = 0; i < cellsToRemove && i < positions.length; i++) {
                const [r, c] = positions[i];
                puzzle[r][c] = 0;
            }
            
            // Initialize user grid with puzzle values
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    userGrid[r][c] = puzzle[r][c];
                }
            }
        }
        
        function renderGrid() {
            const grid = document.getElementById('sudokuGrid');
            grid.innerHTML = '';
            
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    const value = userGrid[r][c];
                    if (value !== 0) {
                        cell.textContent = value;
                        if (puzzle[r][c] !== 0) {
                            cell.classList.add('fixed');
                        }
                    }
                    
                    cell.onclick = () => selectCell(r, c);
                    grid.appendChild(cell);
                }
            }
        }
        
        function selectCell(row, col) {
            if (puzzle[row][col] !== 0) return; // Can't change fixed cells
            
            // Remove previous selection
            document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
            
            // Select new cell
            selectedCell = { row, col };
            const index = row * 9 + col;
            document.querySelectorAll('.cell')[index].classList.add('selected');
        }
        
        function inputNumber(num) {
            if (!selectedCell) return;
            
            const { row, col } = selectedCell;
            userGrid[row][col] = num;
            
            // Update display
            const index = row * 9 + col;
            const cells = document.querySelectorAll('.cell');
            cells[index].textContent = num;
            cells[index].classList.remove('error');
            
            document.getElementById('message').textContent = '';
        }
        
        function clearCell() {
            if (!selectedCell) return;
            
            const { row, col } = selectedCell;
            userGrid[row][col] = 0;
            
            const index = row * 9 + col;
            const cells = document.querySelectorAll('.cell');
            cells[index].textContent = '';
            cells[index].classList.remove('error');
        }
        
        function checkSolution() {
            let correct = true;
            const cells = document.querySelectorAll('.cell');
            
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const index = r * 9 + c;
                    const value = userGrid[r][c];
                    
                    cells[index].classList.remove('error');
                    
                    if (value !== 0 && value !== solution[r][c]) {
                        cells[index].classList.add('error');
                        correct = false;
                    }
                }
            }
            
            if (correct) {
                document.getElementById('message').textContent = '🎉 Congratulations! Solution is correct!';
            } else {
                document.getElementById('message').textContent = '❌ Some cells are incorrect. Keep trying!';
            }
        }
        
        function newGame() {
            generatePuzzle();
            renderGrid();
            selectedCell = null;
            document.getElementById('message').textContent = '';
        }
        
        // Keyboard input
        document.addEventListener('keydown', (e) => {
            if (selectedCell && e.key >= '1' && e.key <= '9') {
                inputNumber(parseInt(e.key));
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                clearCell();
            }
        });
        
        // Initialize
        newGame();
    </script>
</body>
</html>
