<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Support - MindFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #000000;
        }

        .header {
            background: #111111;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333333;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            color: #888888;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #000000;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-content {
            background: #ffffff;
            color: #000000;
            border-bottom-right-radius: 4px;
        }

        .bot .message-content {
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333333;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: inline-block;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-area {
            display: flex;
            padding: 20px;
            background: #111111;
            border-top: 1px solid #333333;
            position: sticky;
            bottom: 0;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #333333;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Poppins', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
        }

        .input-area input:focus {
            border-color: #ffffff;
        }

        .input-area input::placeholder {
            color: #666666;
        }

        .input-area button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 24px;
            margin-left: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: #000000;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 3px;
        }

        .chat-box::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            border: 1px solid #333333;
        }

        .back-btn:hover {
            background: #333333;
        }
    </style>
</head>
<body>
    <a href="{% url 'dashboard' %}" class="back-btn">← Back</a>

    <div class="chat-container">
        <div class="header">
            <h1>🧠 Mental Health Support</h1>
            <p>A safe space to talk about your feelings</p>
        </div>

        <div id="chatBox" class="chat-box">
            <div class="message bot">
                <div class="message-content">
                    Hello! 👋 I'm your supportive mental health assistant. 
                    <br>
                    How are you feeling today? I'm here to listen and help you navigate through any challenges you might be facing.
                </div>
            </div>
        </div>

        <div class="input-area">
            <input id="userInput" type="text" placeholder="Share your thoughts..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            let input = document.getElementById("userInput");
            let message = input.value.trim();

            if (message === "") return;

            let chatBox = document.getElementById("chatBox");

            // Add user message
            chatBox.innerHTML += `
                <div class="message user">
                    <div class="message-content">${escapeHtml(message)}</div>
                </div>
            `;

            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Show typing indicator
            chatBox.innerHTML += `
                <div class="message bot" id="typingIndicator">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            // Send to Django endpoint
            fetch("{% url 'chatbot_chat' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie('csrftoken')
                },
                body: JSON.stringify({message: message})
            })
            .then(response => response.json())
            .then(data => {
                // Remove typing indicator
                const typingIndicator = document.getElementById("typingIndicator");
                if (typingIndicator) {
                    typingIndicator.remove();
                }

                // Add bot response
                chatBox.innerHTML += `
                    <div class="message bot">
                        <div class="message-content">${data.reply}</div>
                    </div>
                `;

                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => {
                // Remove typing indicator
                const typingIndicator = document.getElementById("typingIndicator");
                if (typingIndicator) {
                    typingIndicator.remove();
                }

                // Show error message
                chatBox.innerHTML += `
                    <div class="message bot">
                        <div class="message-content">Sorry, I'm having trouble connecting right now. Please try again later.</div>
                    </div>
                `;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Django CSRF token helper
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
